name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  typescript-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run Web tests
        run: pnpm --filter web test run

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Workspace Dependencies
        run: |
          uv pip install --system -e ./packages/shared-python
          uv pip install --system -e ./apps/api
          uv pip install --system -e ./apps/agent
          uv pip install --system pytest pytest-asyncio pytest-cov

      - name: Run Pytest
        run: |
          pytest apps/api/tests/
          pytest apps/agent/tests/
          # pytest tests/ # Run E2E and integration tests
