[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "shared-python"
version = "0.1.0"
description = "Shared Python utilities, Pydantic models, and security libraries for CyberNest"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0.0",
    "structlog>=24.1.0",
    "cryptography>=42.0.0",
    "bcrypt>=4.1.0",
    "pyjwt>=2.8.0",
]

[tool.hatch.build.targets.wheel]
packages = ["shared_python"]
